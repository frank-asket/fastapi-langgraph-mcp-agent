# Fly.io тАФ Study Coach API (FastAPI). Replace `app` with your Fly app name (`fly apps create` or `fly launch`).
app = "study-coach-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpus = 1
  cpu_kind = "shared"
  memory = "1gb"

# Create first: fly volumes create study_coach_data --region lhr --size 3
# Region must match primary_region.
[[mounts]]
  source = "study_coach_data"
  destination = "/data"
